apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coder-2
  namespace: argocd-poc
spec:
  project: default
  source:
    repoURL: 'https://github.com/manojchappidi/argocd-apps.git'
    targetRevision: main
    path: 'coder'                # folder containing Chart.yaml
    helm:
      valueFiles:
        - values.yml            # local values file inside the chart folder
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd-poc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
