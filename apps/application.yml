apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coder-2
  namespace: argocd-poc

spec:
  project: default

  source:
    repoURL: https://helm.coder.com/v2
    chart: coder
    targetRevision: 2.29.7
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-poc


  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
