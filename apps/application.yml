apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coder
  namespace: argocd-poc
spec:
  project: default
  source:
    repoURL: 'https://helm.coder.com/v2'   # Helm repo
    chart: coder                           # chart name
    targetRevision: 2.29.7                 # chart version
    helm:
      valueFiles:
        - values.yaml                      # your custom values file
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd-poc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
