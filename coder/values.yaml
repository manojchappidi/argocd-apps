# coder/values.yaml
image:
  repository: ghcr.io/coder/coder
  tag: v2.29.5
  pullPolicy: IfNotPresent

deployment:
  enabled: true

service:
  enabled: true
  type: LoadBalancer
  port: 80

database:
  host: postgres
  port: 5432
  user: coder
  password: coderpass
  name: coderdb

postgresql:
  enabled: false

ingress:
  enabled: false

coder:
  env:
    - name: CODER_PG_CONNECTION_URL
      value: "postgres://coder:coderpass@postgres:5432/coderdb?sslmode=disable"
