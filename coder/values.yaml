# coder/values.yaml
# Minikube-ready Coder configuration

service:
  type: NodePort
  port: 80
  nodePort: 30990

database:
  host: postgres       # your postgres service name
  port: 5432
  user: coder
  password: coderpass
  name: coderdb

postgresql:
  enabled: false       # disable built-in Postgres since you have your own

ingress:
  enabled: false       # not using ingress for Minikube
1
