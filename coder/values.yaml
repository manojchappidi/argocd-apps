# coder/values.yaml
# Configuration for Coder Helm chart

service:
  type: LoadBalancer
  port: 80

database:
  host: postgres
  port: 5432
  user: coder
  password: coderpass
  name: coderdb

postgresql:
  enabled: false

ingress:
  enabled: false

coder:
  env:
    - name: CODER_PG_CONNECTION_URL
      value: "postgres://coder:coderpass@postgres:5432/coderdb?sslmode=disable"
