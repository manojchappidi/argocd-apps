apiVersion: apps/v1
kind: Deployment
metadata:
  name: coder
  namespace: argocd-poc
  labels:
    app: coder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coder
  template:
    metadata:
      labels:
        app: coder
    spec:
      containers:
        - name: coder
          image: ghcr.io/coder/coder:v2.31.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: CODER_PG_CONNECTION_URL
              value: "postgres://coder:coderpass@postgres:5432/coderdb?sslmode=disable"
